<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculatrice scientifique</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <h1>Calculatrice scientifique</h1>

  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="add('(')">(</button>
    <button onclick="add(')')">)</button>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">−</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="add('+')">+</button>

    <button onclick="addFunction('sin')">sin</button>
    <button onclick="addFunction('cos')">cos</button>
    <button onclick="addFunction('tan')">tan</button>
    <button onclick="addFunction('sqrt')">√</button>

    <button onclick="addFunction('log')">log</button>
    <button onclick="addFunction('ln')">ln</button>
    <button onclick="add('Math.PI')">π</button>
    <button onclick="add('**')">xʸ</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
